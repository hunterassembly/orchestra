productName: Orchestra Dev

extraMetadata:
  main: dist/main.cjs

publish: []

protocols:
  - name: Orchestra Dev URL
    schemes:
      - orchestradev

mac:
  artifactName: "Orchestra-Dev-${arch}.${ext}"
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false

