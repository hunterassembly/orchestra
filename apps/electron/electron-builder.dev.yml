  artifactName: "Orchestra-Dev-${arch}.dmg"
  title: "Orchestra Dev"

win:
  artifactName: "Orchestra-Dev-${arch}.${ext}"

linux:
  artifactName: "Orchestra-Dev-${arch}.${ext}"
