commands:
  install: bun install
  typecheck:gateway: cd packages/mobile-gateway && bun run tsc --noEmit
  typecheck:contracts: cd packages/mobile-contracts && bun run tsc --noEmit
  typecheck:tokens: cd packages/mobile-tokens && bun run tsc --noEmit
  typecheck:mobile: cd apps/mobile && npx tsc --noEmit
  test:gateway: cd packages/mobile-gateway && bun test
  test:contracts: cd packages/mobile-contracts && bun test
  test:tokens: cd packages/mobile-tokens && bun test
  test:mobile: cd apps/mobile && npx jest --maxWorkers=8
  test:all: bun test packages/mobile-gateway packages/mobile-contracts packages/mobile-tokens && cd apps/mobile && npx jest --maxWorkers=8
  lint: echo "No lint configured for new packages yet"

services:
  gateway-test:
    start: cd packages/mobile-gateway && PORT=7842 bun run src/test-server.ts &
    stop: lsof -ti :7842 | xargs kill 2>/dev/null
    healthcheck: curl -sf http://localhost:7842/api/health
    port: 7842
    depends_on: []
